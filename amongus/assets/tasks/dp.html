<!DOCTYPE html>
<html>
<head>
    <title>Divert Power</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: sans-serif; }
        
        .task-panel { 
            position: relative; width: 550px; height: 400px; background: #2a2a2a; 
            border: 5px solid #111; border-radius: 8px; display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box; box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .label { color: #aaa; font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        .slider-grid { display: flex; justify-content: space-around; align-items: flex-end; height: 250px; padding: 0 20px; }

        .slider-track {
            position: relative; width: 40px; height: 200px; background: #111;
            border-radius: 4px; border: 2px solid #333; display: flex; justify-content: center;
        }

        /* The Indicator Light above each slider */
        .light {
            position: absolute; top: -40px; width: 25px; height: 25px;
            border-radius: 50%; background: #200; border: 2px solid #000;
            transition: all 0.3s;
        }
        .light.active { background: #f00; box-shadow: 0 0 10px #f00; }
        .light.complete { background: #0f0; box-shadow: 0 0 15px #0f0; }

        /* The Slider Handle */
        .handle {
            position: absolute; bottom: 0; width: 50px; height: 30px;
            background: #444; border: 3px solid #111; border-radius: 4px;
            cursor: ns-resize; z-index: 5; box-shadow: 0 4px 0 #000;
        }

        /* The Yellow Glow for the active slider */
        .active-handle {
            border-color: #ffd700;
            box-shadow: 0 0 15px #ffd700, 0 4px 0 #000;
        }

        .active-handle::before, .active-handle::after {
            content: ''; position: absolute; width: 60px; height: 40px;
            border: 2px solid #ffd700; left: -8px; top: -8px; border-radius: 6px;
            pointer-events: none; opacity: 0.6;
        }

        #status-text { color: #ffd700; text-align: center; margin-top: 15px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="task-panel">
    <div class="header">
        <div class="label">DIVERT POWER TO:</div>
        <div class="label" id="room-label">ELECTRICAL</div>
    </div>

    <div class="slider-grid" id="grid">
        <!-- Sliders will be generated by JS -->
    </div>

    <div id="status-text">SYSTEM STANDBY</div>
</div>

<script>
    const grid = document.getElementById('grid');
    const statusText = document.getElementById('status-text');
    const rooms = ["COMMS", "SHIELDS", "NAV", "O2", "SECURITY", "MEDBAY"];
    const targetRoomIndex = Math.floor(Math.random() * 6);
    
    document.getElementById('room-label').textContent = rooms[targetRoomIndex];

    let isDragging = false;
    let activeHandle = null;

    // Create 6 sliders
    for (let i = 0; i < 6; i++) {
        const track = document.createElement('div');
        track.className = 'slider-track';
        
        const light = document.createElement('div');
        light.className = 'light';
        if (i === targetRoomIndex) light.classList.add('active');
        track.appendChild(light);

        const handle = document.createElement('div');
        handle.className = 'handle';
        if (i === targetRoomIndex) {
            handle.classList.add('active-handle');
            handle.style.bottom = '0px';
        } else {
            // Other sliders are randomized or set to middle
            handle.style.bottom = Math.floor(Math.random() * 50) + 'px';
            handle.style.pointerEvents = 'none'; // Only active one moves
            handle.style.opacity = '0.6';
        }

        handle.addEventListener('mousedown', (e) => {
            if (handle.classList.contains('active-handle')) {
                isDragging = true;
                activeHandle = handle;
                statusText.textContent = "DIVERTING...";
            }
        });

        track.appendChild(handle);
        grid.appendChild(track);
    }

    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !activeHandle) return;

        const track = activeHandle.parentElement;
        const rect = track.getBoundingClientRect();
        
        // Calculate position relative to track bottom
        let val = rect.bottom - e.clientY - 15; // 15 is half handle height
        val = Math.max(0, Math.min(val, 170)); // 170 is track height - handle height
        
        activeHandle.style.bottom = val + 'px';

        // Check for completion (pushed to top)
        if (val >= 165) {
            completeTask();
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        if (activeHandle && parseInt(activeHandle.style.bottom) < 165) {
            statusText.textContent = "RESUME DIVERT";
        }
    });

    function completeTask() {
        isDragging = false;
        activeHandle.style.pointerEvents = 'none';
        activeHandle.classList.remove('active-handle');
        
        // Change light to green
        const light = activeHandle.parentElement.querySelector('.light');
        light.classList.remove('active');
        light.classList.add('complete');
        
        statusText.textContent = "POWER DIVERTED";
        statusText.style.color = "#0f0";
    }
</script>
</body>
</html>
