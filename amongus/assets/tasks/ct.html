<!DOCTYPE html>
<html>
<head>
    <title>Collect Trash</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        
        .task-panel { 
            position: relative; width: 540px; height: 500px; background: #3a3a3a; 
            border: 8px solid #111; border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; padding: 20px; box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .header { width: 100%; color: #888; font-weight: bold; font-size: 14px; margin-bottom: 20px; letter-spacing: 2px; }

        /* The Square Chamber */
        .filter-chamber {
            position: relative; width: 480px; height: 320px; background: #0a0a0a;
            border: 6px solid #222; border-radius: 4px; overflow: hidden;
            box-shadow: inset 0 0 30px #000;
        }

        /* The Square Sliding Vent Cover */
        #vent-door {
            position: absolute; width: 100%; height: 100%; background: #4a4a4a;
            border-right: 4px solid #111; z-index: 10; top: 0; left: 0;
            display: grid; grid-template-rows: repeat(12, 1fr); gap: 8px; padding: 10px; box-sizing: border-box;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform:rotateY('0deg'); transform-origin: right;
        }
        .vent-slat { background: #222; border-radius: 2px; height: 100%; width: 100%; }

        /* Trash/Leaves */
        .trash-item {
            position: absolute; width: 50px; height: 50px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; user-select: none; z-index: 5;
            transition: opacity 0.2s;
        }

        /* Continuous rotation for the floating effect */
        @keyframes float-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .floating { animation: float-spin 3s linear infinite; }

        /* "Sucked out" effect */
        .sucked { 
            transform: scale(0) rotate(720deg) !important; 
            opacity: 0; 
            transition: all 0.4s ease-in;
        }

        .status-msg { margin-top: 30px; font-weight: bold; font-size: 20px; color: #ffd700; text-align: center; }
        a {
            position: absolute; top: 20px; left: 20px;
            background: #5c6b73;
            border: 4px solid #111;
            border-radius: 4px;
            color: #eee;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s, transform 0.05s;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.3);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="../tasks.html">Back to Tasks</a>
<div class="task-panel">
    <div class="header">CLEAN O2 FILTER</div>

    <div class="filter-chamber" id="chamber">
        <div id="vent-door">
            <!-- Many slats for that industrial look -->
            <div class="vent-slat"></div><div class="vent-slat"></div>
            <div class="vent-slat"></div><div class="vent-slat"></div>
            <div class="vent-slat"></div><div class="vent-slat"></div>
            <div class="vent-slat"></div><div class="vent-slat"></div>
            <div class="vent-slat"></div><div class="vent-slat"></div>
            <div class="vent-slat"></div><div class="vent-slat"></div>
        </div>
    </div>

    <div id="status" class="status-msg">WAITING...</div>
</div>

<script>
    const chamber = document.getElementById('chamber');
    const vent = document.getElementById('vent-door');
    const status = document.getElementById('status');
    
    const icons = ['🍂', '🍁', '🌿', '🍃', '🦴'];
    let trashCount = 10;
    let activeItems = [];

    function init() {
        // Create items first so they are behind the door
        for (let i = 0; i < trashCount; i++) {
            const el = document.createElement('div');
            el.className = 'trash-item floating';
            el.textContent = icons[Math.floor(Math.random() * icons.length)];
            
            const x = Math.random() * 260;
            const y = Math.random() * 260;
            
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            // Random physics vectors
            const vx = (Math.random() - 0.5) * 2;
            const vy = (Math.random() - 0.5) * 2;

            el.addEventListener('click', () => {
                if (el.classList.contains('sucked')) return;
                el.classList.remove('floating');
                el.classList.add('sucked');
                updateCounter();
            });
            
            chamber.appendChild(el);
            activeItems.push({ el, x, y, vx, vy });
        }

        // Open the square vent door
        setTimeout(() => {
            vent.style.transform = 'rotateY(-135deg)';
            status.textContent = `REMAINING: ${trashCount}`;
            animateTrash();
        }, 800);
    }

    function animateTrash() {
        activeItems.forEach(item => {
            if (item.el.classList.contains('sucked')) return;

            item.x += item.vx;
            item.y += item.vy;

            // Bounce off square edges
            if (item.x < 0 || item.x > 270) item.vx *= -1;
            if (item.y < 0 || item.y > 270) item.vy *= -1;

            item.el.style.left = item.x + 'px';
            item.el.style.top = item.y + 'px';
        });
        requestAnimationFrame(animateTrash);
    }

    function updateCounter() {
        trashCount--;
        status.textContent = trashCount > 0 ? `REMAINING: ${trashCount}` : "FILTER CLEAR";

        if (trashCount === 0) {
            status.style.color = "#0f0";
            setTimeout(() => {
                vent.style.transform = 'translateX(0)';
                setTimeout(() => {
                    status.textContent = "TASK COMPLETE";
                }, 800);
            }, 500);
        }
    }

    init();
</script>
</body>
</html>
