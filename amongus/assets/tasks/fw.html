<!DOCTYPE html>
<html>
<head>
    <title>Fix Wiring</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .task-container { position: relative; perspective: 1500px; width: 600px; height: 450px; }
        
        svg { 
            background: #1a1a1a; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            user-select: none; touch-action: none; width: 100%; height: 100%; 
        }

        #vent-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(145deg, #444, #222);
            border: 4px solid #111; border-radius: 12px;
            display: grid; grid-template-rows: repeat(6, 1fr); gap: 15px; padding: 20px;
            box-sizing: border-box; transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10; pointer-events: none;
        }
        .vent-slat { background: #000; border-radius: 4px; border-bottom: 2px solid #555; }
        .vent-open { transform: rotateY(-110deg); }

        .node { cursor: pointer; transition: r 0.2s; }
        .node:hover { r: 12; }
        line { pointer-events: none; }
    </style>
</head>
<body>

<div class="task-container">
    <div id="vent-cover">
        <div class="vent-slat"></div><div class="vent-slat"></div>
        <div class="vent-slat"></div><div class="vent-slat"></div>
        <div class="vent-slat"></div><div class="vent-slat"></div>
    </div>

    <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" id="main-svg">
        <rect width="400" height="300" fill="#2d2d2d" stroke="#111" stroke-width="4" />
        <text id="status-text" x="20" y="30" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">TASK: FIX WIRING (0/4)</text>
        <g id="wires-layer"></g>
        <g id="nodes-layer"></g>
    </svg>
</div>

<script>
    const svg = document.getElementById('main-svg');
    const nodesLayer = document.getElementById('nodes-layer');
    const wiresLayer = document.getElementById('wires-layer');
    const statusText = document.getElementById('status-text');
    const vent = document.getElementById('vent-cover');
    
    const colors = ['#FF0000', '#FFFF00', '#0000FF', '#FF00FF'];
    const yPos = [70, 130, 190, 250]; 
    const SVG_NS = "http://www.w3.org/2000/svg";

    let activeStartNode = null;
    let tempLine = null;
    let completedCount = 0;

    function init() {
        // Randomize the colors for both sides
        const leftColors = [...colors].sort(() => Math.random() - 0.5);
        const rightColors = [...colors].sort(() => Math.random() - 0.5);

        yPos.forEach((y, i) => {
            createNode(`left-${i}`, 40, y, leftColors[i], null);
            createNode(`right-${i}`, 360, y, rightColors[i], rightColors[i]);
        });

        // Lift the vent
        setTimeout(() => vent.classList.add('vent-open'), 500);
    }

    function createNode(id, cx, cy, fill, dataColor) {
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('id', id);
        c.setAttribute('class', 'node');
        c.setAttribute('cx', cx);
        c.setAttribute('cy', cy);
        c.setAttribute('r', '10');
        c.setAttribute('fill', fill);
        if (dataColor) c.setAttribute('data-color', dataColor);
        
        c.addEventListener('mousedown', (e) => {
            if (!id.startsWith('left-')) return;
            activeStartNode = e.target;
            const coords = getXY(e);
            
            tempLine = document.createElementNS(SVG_NS, 'line');
            tempLine.setAttribute('x1', cx);
            tempLine.setAttribute('y1', cy);
            tempLine.setAttribute('x2', coords.x);
            tempLine.setAttribute('y2', coords.y);
            tempLine.setAttribute('stroke', fill);
            tempLine.setAttribute('stroke-width', '12');
            tempLine.setAttribute('stroke-linecap', 'round');
            wiresLayer.appendChild(tempLine);
        });
        nodesLayer.appendChild(c);
    }

    function getXY(e) {
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        const cursorpt = pt.matrixTransform(svg.getScreenCTM().inverse());
        return { x: cursorpt.x, y: cursorpt.y };
    }

    window.addEventListener('mousemove', (e) => {
        if (activeStartNode && tempLine) {
            const coords = getXY(e);
            tempLine.setAttribute('x2', coords.x);
            tempLine.setAttribute('y2', coords.y);
        }
    });

    window.addEventListener('mouseup', (e) => {
        if (activeStartNode && tempLine) {
            const target = e.target;
            const startColor = activeStartNode.getAttribute('fill');

            if (target && target.id && target.id.startsWith('right-') && target.getAttribute('data-color') === startColor) {
                tempLine.setAttribute('x2', target.getAttribute('cx'));
                tempLine.setAttribute('y2', target.getAttribute('cy'));
                activeStartNode.style.pointerEvents = 'none';
                target.style.pointerEvents = 'none';
                completedCount++;
                statusText.textContent = `TASK: FIX WIRING (${completedCount}/4)`;

                if (completedCount === 4) {
                    statusText.textContent = "TASK COMPLETE!";
                    statusText.setAttribute('fill', '#00FF00');
                }
            } else {
                tempLine.remove();
            }
        }
        activeStartNode = null;
        tempLine = null;
    });

    init();
</script>
</body>
</html>
