<!DOCTYPE html>
<html>
<head><title>Tetris</title></head>
<body style="background:#202028; color:#fff; font-family:sans-serif;">
    <h1>Tetris</h1>
    <canvas id="tetris" width="240" height="400" style="border:2px solid #fff;"></canvas>
    <div style="display:inline-block; vertical-align:top; padding:20px;">
        <p>Score: <span id="score">0</span></p>
        <p>Next:</p>
        <canvas id="next-piece" width="100" height="100" style="background:#000;"></canvas>
        <br><button id="start-button">Start Game</button>
        <div style="margin-top:30px; border-top:1px solid #555;">
            <p>🏆 World Record:<br>
            <span id="best-player">Loading...</span>: <span id="best-score">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
