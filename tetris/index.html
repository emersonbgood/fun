<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris - Local Edition</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #000;
        }
        .stats {
            padding: 20px;
            border: 1px solid #555;
            background: #2a2a35;
            min-width: 120px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            margin-top: 10px;
        }
        button:hover { background: #45a049; }
        .controls {
            margin-top: 20px;
            font-size: 0.8em;
            color: #aaa;
        }
        .label { margin-bottom: 5px; font-weight: bold; color: #4CAF50; }
    </style>
</head>
<body>

    <h1>Tetris</h1>

    <div id="game-container">
        <div class="stats">
            <div class="label">Hold (C):</div>
            <canvas id="hold-piece" width="100" height="100"></canvas>
            <p>High Score: <span id="high-score">0</span></p>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="stats">
            <p>Score: <span id="score">0</span></p>
            <div class="label">Next:</div>
            <canvas id="next-piece" width="100" height="100"></canvas>
            <br>
            <button id="start-button">Start Game</button>
            
            <div class="controls">
                Arrows: Move/Rotate<br>
                Space: Hard Drop<br>
                C: Swap Piece
            </div>
        </div>
    </div>

<script>
    function drawMatrix(matrix, offset, ctx, colorOverride = null) {
    if (!matrix) return;
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                const posX = x + offset.x;
                const posY = y + offset.y;
                const color = colorOverride || colors[value];

                // Base color
                ctx.fillStyle = color;
                ctx.fillRect(posX, posY, 1, 1);

                // Skip lighting for ghost piece (usually translucent)
                if (colorOverride) return;

                // 3D Bevel effect (scaled to 1x1 units)
                ctx.lineWidth = 0.1;

                // Light highlight (Top and Left)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.moveTo(posX, posY + 1);
                ctx.lineTo(posX, posY);
                ctx.lineTo(posX + 1, posY);
                ctx.stroke();

                // Dark shadow (Bottom and Right)
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.beginPath();
                ctx.moveTo(posX + 1, posY);
                ctx.lineTo(posX + 1, posY + 1);
                ctx.lineTo(posX, posY + 1);
                ctx.stroke();
            }
        });
    });
}

</script>
</body>
</html>
